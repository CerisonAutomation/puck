name: CI

on:
  push:
    branches: [cerison/setup, main]
    paths:
      - 'cerison/cpm-app/**'
  pull_request:
    branches: [main]
    paths:
      - 'cerison/cpm-app/**'

jobs:
  typecheck:
    name: TypeScript + Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cerison/cpm-app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: cerison/cpm-app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
  build:
    name: Next.js Build Check
    runs-on: ubuntu-latest
    needs: typecheck
    defaults:
      run:
        working-directory: cerison/cpm-app
    env:
      DATABASE_URI: ${{ secrets.DATABASE_URI }}
      PAYLOAD_SECRET: ci_secret_placeholder
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      NEXT_PUBLIC_SERVER_URL: https://cpm.vercel.app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: cerison/cpm-app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
